# Nginx reverse proxy with TLS + WebSocket upgrade for the WebRTC signaling.
upstream avatar_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;          # avatar image uploads

    location / {
        proxy_pass http://avatar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket signaling channel
    location /ws {
        proxy_pass http://avatar_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# NOTE: WebRTC *media* (audio/video RTP) does NOT flow through nginx — it goes
# peer-to-peer over UDP via ICE/STUN/TURN. Expose the RunPod UDP range and/or run
# a TURN server (see SETUP.md) so media can traverse NAT.
